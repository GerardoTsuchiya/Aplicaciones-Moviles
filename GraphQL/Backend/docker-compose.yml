services:
  mysql:
    image: mysql:8.0
    container_name: todo_mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: todo_db
      MYSQL_USER: flaey
      MYSQL_PASSWORD: 12345

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: 